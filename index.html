<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modül 2 — Çiftçi 2.0: Tarımda Dijital Dönüşüm</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Exo 2',sans-serif}
body{background:#050e1a;display:flex;flex-direction:column}

.header{
  background:linear-gradient(90deg,#051428,#0a1f3d);
  padding:10px 24px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,200,255,0.15);
}
.header-left{display:flex;align-items:center;gap:12px}
.mod-tag{background:rgba(0,200,255,0.15);border:1px solid rgba(0,200,255,0.4);color:#00c8ff;font-size:10px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.header h1{color:#e0f4ff;font-size:17px;font-weight:700}
.hud{display:flex;gap:16px;align-items:center}
.hud-item{text-align:center}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:#00c8ff}
.hud-lbl{font-size:10px;color:rgba(224,244,255,0.4);letter-spacing:1px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px 20px;gap:12px;min-height:0}

.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(0,200,255,0.5)}

/* TECH CARDS GRID */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  flex-shrink:0;
}

.tech-card{
  background:linear-gradient(145deg,rgba(10,31,61,0.9),rgba(5,14,26,0.95));
  border:1px solid rgba(0,200,255,0.15);
  border-radius:12px;
  padding:14px 10px;
  cursor:pointer;
  transition:all 0.25s;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.tech-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(0,200,255,0.08),transparent 60%);
  opacity:0;transition:opacity 0.3s;
}
.tech-card:hover{border-color:rgba(0,200,255,0.5);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,200,255,0.15)}
.tech-card:hover::before{opacity:1}
.tech-card.active{border-color:#00c8ff;background:linear-gradient(145deg,rgba(0,200,255,0.12),rgba(0,100,200,0.08));box-shadow:0 0 20px rgba(0,200,255,0.2)}

.card-icon{font-size:28px;margin-bottom:6px;display:block}
.card-name{font-size:12px;font-weight:700;color:#e0f4ff;margin-bottom:3px;line-height:1.3}
.card-cat{font-size:10px;color:rgba(0,200,255,0.6);font-family:'JetBrains Mono',monospace}

.card-glow{
  position:absolute;bottom:-2px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#00c8ff,transparent);
  opacity:0;transition:opacity 0.3s;
}
.tech-card.active .card-glow,.tech-card:hover .card-glow{opacity:1}

/* DETAIL AREA */
.detail-row{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  min-height:0;
}

.detail-main{
  background:linear-gradient(145deg,rgba(10,31,61,0.95),rgba(5,14,26,0.98));
  border:1px solid rgba(0,200,255,0.2);
  border-radius:14px;
  padding:18px;
  display:flex;flex-direction:column;gap:12px;
  overflow:hidden;
}
.detail-header{display:flex;align-items:center;gap:12px}
.detail-big-icon{font-size:42px}
.detail-title{font-size:20px;font-weight:800;color:#e0f4ff}
.detail-sub{font-size:12px;color:rgba(0,200,255,0.7);margin-top:2px;font-family:'JetBrains Mono',monospace}
.detail-desc{font-size:13px;color:rgba(224,244,255,0.75);line-height:1.6;flex:1}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px}
.dtag{background:rgba(0,200,255,0.1);border:1px solid rgba(0,200,255,0.3);color:#00c8ff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}

.impact-panel{
  background:rgba(10,31,61,0.7);
  border:1px solid rgba(0,200,255,0.12);
  border-radius:14px;
  padding:16px;
  display:flex;flex-direction:column;gap:10px;
}
.impact-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(0,200,255,0.5);text-transform:uppercase}
.impact-stat{display:flex;flex-direction:column;gap:4px}
.impact-label{font-size:11px;color:rgba(224,244,255,0.5)}
.impact-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#00c8ff}
.impact-bar-wrap{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.impact-bar{height:100%;border-radius:3px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1)}

.compare-panel{
  background:rgba(10,31,61,0.7);
  border:1px solid rgba(0,200,255,0.12);
  border-radius:14px;
  padding:16px;
  display:flex;flex-direction:column;gap:8px;
}
.compare-title{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(0,200,255,0.5);text-transform:uppercase;margin-bottom:4px}
.compare-row{display:flex;gap:8px}
.compare-col{flex:1;background:rgba(0,0,0,0.3);border-radius:8px;padding:10px}
.compare-col-title{font-size:10px;font-weight:700;color:rgba(224,244,255,0.5);margin-bottom:6px}
.compare-item{font-size:11px;color:rgba(224,244,255,0.7);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.compare-item:last-child{border:none}
.compare-item.pro{color:#a5d6a7}
.compare-item.con{color:#ef9a9a}

.empty-detail{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  grid-column:1/-1;gap:12px;color:rgba(224,244,255,0.3);text-align:center;padding:20px;
}
.empty-detail .eicon{font-size:48px;opacity:0.4}
.empty-detail p{font-size:13px;line-height:1.6;max-width:400px}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="mod-tag">MODÜL 2</span>
    <h1>🚜 Çiftçi 2.0 — Tarımda Dijital Dönüşüm</h1>
  </div>
  <div class="hud">
    <div class="hud-item"><div class="hud-val" id="viewCount">0</div><div class="hud-lbl">KEŞFEDİLEN</div></div>
    <div class="hud-item"><div class="hud-val" id="totalCards">10</div><div class="hud-lbl">TOPLAM</div></div>
  </div>
</div>

<div class="main">
  <div class="section-label">Teknoloji Alanına Tıkla → Detayları Gör</div>

  <div class="cards-grid" id="cardsGrid"></div>

  <div class="detail-row" id="detailRow">
    <div class="empty-detail">
      <div class="eicon">💡</div>
      <p>Yukarıdan bir teknoloji kartına tıkla. Tarımda kullanılan dijital araçları keşfet ve nasıl çalıştıklarını öğren!</p>
    </div>
  </div>
</div>

<script>
const techs = [
  {icon:'🛰️',name:'Uydu\nGörüntüleme',cat:'Remote Sensing',
   desc:'Uydu görüntüleri ile tarla sağlığını izle. NDVI indeksi ile her parselin canlılığı günlük analiz edilir. 1 uzman 10.000 dönümü tek başına yönetebilir.',
   tags:['NDVI','Sentinel-2','Multispektral'],
   impacts:[{l:'Verim Artışı',v:'%22',p:22,c:'#66bb6a'},{l:'Gübre Tasarrufu',v:'%30',p:30,c:'#ffb300'},{l:'Alan Kapsama',v:'Sınırsız',p:95,c:'#42a5f5'}],
   pros:['Geniş alan kapsama','Gerçek zamanlı analiz','Düşük maliyet/ha'],cons:['Bulut engeli','Çözünürlük sınırı','İnternet gerekli']},
  {icon:'🤖',name:'AI Hastalık\nTespiti',cat:'Computer Vision',
   desc:'Yapay zeka, bitki yapraklarının fotoğrafını analiz ederek hastalığı %94 doğrulukla tespit eder. İnsan gözünden 200 kat hızlı.',
   tags:['CNN','ResNet','Erken Teşhis'],
   impacts:[{l:'Tespit Hızı',v:'<1 sn',p:99,c:'#00c8ff'},{l:'Doğruluk',v:'%94',p:94,c:'#66bb6a'},{l:'Kimyasal Azalma',v:'%40',p:40,c:'#ef9a9a'}],
   pros:['Anlık sonuç','7/24 çalışır','Sürekli öğrenir'],cons:['Eğitim verisi lazım','Bağlantı gerekli','Yanlış pozitif riski']},
  {icon:'📡',name:'IoT\nSensörler',cat:'Internet of Things',
   desc:'Toprağa yerleştirilen küçük sensörler nem, pH, sıcaklık ve besin değerlerini her 15 dakikada buluta gönderir.',
   tags:['MQTT','LoRaWAN','Edge AI'],
   impacts:[{l:'Su Tasarrufu',v:'%35',p:35,c:'#42a5f5'},{l:'Gübre Verimliliği',v:'%28',p:28,color:'#ffb300'},{l:'Veri Sıklığı',v:'15dk',p:80,c:'#66bb6a'}],
   pros:['Otomatik izleme','Anlık uyarı','Düşük güç tüketimi'],cons:['Kurulum maliyeti','Batarya bakımı','Hava koşulları']},
  {icon:'🚁',name:'Drone ile\nGözlem',cat:'UAV Technology',
   desc:'Tarım droneları 100 dönümü 20 dakikada tarar. Kamera ve sensörler ile bitki stresini erken yakalar.',
   tags:['LIDAR','Multirotor','Thermal'],
   impacts:[{l:'Tarama Hızı',v:'5ha/saat',p:85,c:'#ffb300'},{l:'Verimlilik',v:'%45↑',p:45,c:'#66bb6a'},{l:'Maliyet Tasarrufu',v:'%60',p:60,c:'#00c8ff'}],
   pros:['Yüksek çözünürlük','Hızlı analiz','Geniş açılı kamera'],cons:['Hava koşullarına bağlı','Kısa uçuş süresi','Lisans gerekli']},
  {icon:'💧',name:'Akıllı\nSulama',cat:'Precision Irrigation',
   desc:'AI sulama sistemi sensör verisine ve hava tahminine göre sulamayı otomatik planlar. Su israfını %50 azaltır.',
   tags:['Drip System','Zamanlayıcı','Weather API'],
   impacts:[{l:'Su Tasarrufu',v:'%50',p:50,c:'#42a5f5'},{l:'Verim',v:'%18↑',p:18,c:'#66bb6a'},{l:'Enerji',v:'%25↓',p:75,c:'#ffb300'}],
   pros:['Tam otomasyon','Kök hedefli sulama','Enerji verimliliği'],cons:['Yüksek kurulum','Teknik bakım','Sistem arızaları']},
  {icon:'📱',name:'Tarım\nUygulamaları',cat:'AgriTech Apps',
   desc:'Akıllı telefon uygulamaları ile hava durumu, piyasa fiyatları, sulama takvimi ve hastalık rehberi tek ekranda.',
   tags:['TarımApp','Çiftçi Bilgi','Mobil AI'],
   impacts:[{l:'Karar Hızı',v:'3x Hızlı',p:75,c:'#00c8ff'},{l:'Piyasa Bilgisi',v:'Gerçek Zaman',p:90,c:'#ffb300'},{l:'Çiftçi Sayısı',v:'2M+',p:80,c:'#66bb6a'}],
   pros:['Kolay kullanım','Ücretsiz/düşük ücret','Çevrimdışı mod'],cons:['Akıllı telefon gerekli','Veri doğruluğu','Bağlantı bağımlılığı']},
  {icon:'🌡️',name:'İklim\nAnalitiği',cat:'Weather Intelligence',
   desc:'Mikro iklim istasyonları ve yapay zeka, 7 günlük yağış, don ve sıcaklık tahminlerini tarla düzeyinde üretir.',
   tags:['Nowcasting','ML Model','Mikro İklim'],
   impacts:[{l:'Tahmin Doğruluğu',v:'%88',p:88,c:'#42a5f5'},{l:'Don Önleme',v:'%95',p:95,c:'#00c8ff'},{l:'Planlama',v:'7 Gün',p:70,c:'#66bb6a'}],
   pros:['Yerel hassasiyet','Erken uyarı sistemi','Entegre planlama'],cons:['Donanım maliyeti','Veri kalibrasyonu','Yanlış tahmin riski']},
  {icon:'🔬',name:'Toprak\nAnalizi AI',cat:'Soil Intelligence',
   desc:'Toprak örneklerinin laboratuvar analizi + AI yorumu ile hangi besin eksik, ne kadar gübre verileceği otomatik hesaplanır.',
   tags:['Spektroskopi','NPK','pH AI'],
   impacts:[{l:'Gübre Tasarrufu',v:'%32',p:32,c:'#ffb300'},{l:'Toprak Sağlığı',v:'%41↑',p:41,c:'#66bb6a'},{l:'Analiz Süresi',v:'24 saat',p:70,c:'#00c8ff'}],
   pros:['Kesin besin tavsiyesi','Uzun vadeli izleme','Çevre dostu'],cons:['Laboratuvar süreci','Numune alma sorunu','Periyodik güncelleme']},
  {icon:'🏭',name:'Otomatik\nHasat',cat:'Agri Robotics',
   desc:'Robotik hasat makineleri bilgisayarlı görü ile meyve-sebzeyi olgunluk düzeyine göre seçerek toplar.',
   tags:['Computer Vision','Manipülatör','6-DOF Kol'],
   impacts:[{l:'Hız',v:'10x İnsan',p:90,c:'#ffb300'},{l:'Kayıp Azalma',v:'%25',p:25,c:'#66bb6a'},{l:'Maliyet',v:'%40↓',p:60,c:'#00c8ff'}],
   pros:['7/24 çalışır','Tutarlı kalite','İşgücü bağımsız'],cons:['Çok yüksek maliyet','Bakım zorluğu','Spesifik ürünler']},
  {icon:'📊',name:'Verim\nTahmini AI',cat:'Predictive Analytics',
   desc:'Geçmiş hasat, hava ve toprak verileri birleştirilerek bu sezon ne kadar hasat edileceği 3 ay önceden tahmin edilir.',
   tags:['LSTM','Time Series','Tahmin Modeli'],
   impacts:[{l:'Tahmin Doğruluğu',v:'%91',p:91,c:'#00c8ff'},{l:'Lojistik Planı',v:'3 Ay Önce',p:85,c:'#66bb6a'},{l:'Fiyat Stratejisi',v:'Optimize',p:78,c:'#ffb300'}],
   pros:['Erken planlama','Lojistik optimizasyon','Fiyat avantajı'],cons:['Büyük veri gerekir','Model güncelleme','Beklenmedik hava']}
];

let viewed = new Set();
let activeCard = null;

const grid = document.getElementById('cardsGrid');
techs.forEach((t,i) => {
  const card = document.createElement('div');
  card.className = 'tech-card';
  card.innerHTML = `<span class="card-icon">${t.icon}</span><div class="card-name">${t.name}</div><div class="card-cat">${t.cat}</div><div class="card-glow"></div>`;
  card.addEventListener('click', () => { selectTech(i, card); });
  grid.appendChild(card);
});

function selectTech(i, cardEl) {
  if(activeCard) activeCard.classList.remove('active');
  cardEl.classList.add('active');
  activeCard = cardEl;
  viewed.add(i);
  document.getElementById('viewCount').textContent = viewed.size;

  const t = techs[i];
  const impHtml = t.impacts.map(im => `
    <div class="impact-stat">
      <div class="impact-label">${im.l}</div>
      <div class="impact-val">${im.v}</div>
      <div class="impact-bar-wrap"><div class="impact-bar" style="width:0%;background:${im.c||'#00c8ff'}" data-pct="${im.p}"></div></div>
    </div>`).join('');

  document.getElementById('detailRow').innerHTML = `
    <div class="detail-main">
      <div class="detail-header">
        <div class="detail-big-icon">${t.icon}</div>
        <div><div class="detail-title">${t.name.replace('\n',' ')}</div><div class="detail-sub">${t.cat}</div></div>
      </div>
      <div class="detail-desc">${t.desc}</div>
      <div class="detail-tags">${t.tags.map(tg=>`<span class="dtag">${tg}</span>`).join('')}</div>
    </div>
    <div class="impact-panel">
      <div class="impact-title">📈 Etki Verileri</div>
      ${impHtml}
    </div>
    <div class="compare-panel">
      <div class="compare-title">⚖️ Avantaj / Dezavantaj</div>
      <div class="compare-row">
        <div class="compare-col">
          <div class="compare-col-title">✅ Avantajlar</div>
          ${t.pros.map(p=>`<div class="compare-item pro">+ ${p}</div>`).join('')}
        </div>
        <div class="compare-col">
          <div class="compare-col-title">⚠️ Dezavantajlar</div>
          ${t.cons.map(c=>`<div class="compare-item con">- ${c}</div>`).join('')}
        </div>
      </div>
    </div>
  `;
  setTimeout(()=>{
    document.querySelectorAll('.impact-bar').forEach(b=>{ b.style.width=b.dataset.pct+'%'; });
  },50);
}
</script>
</body>
</html>
